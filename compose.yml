name: gh-proxy

services:
  backend:
    build:
      context: .
      dockerfile: src/GhProxy.Api/Dockerfile
    image: gh-proxy-api:local
    network_mode: host
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5080
      HOME: /app/data/home
      ConnectionStrings__Default: Data Source=/app/data/gh-proxy.db
      Observability__LogDirectory: /app/data/logs
      LocalProxy__BindHostOverride: 127.0.0.1
      LocalProxy__XrayExecutablePath: /usr/local/bin/xray
      LocalProxy__XrayConfigDirectory: /app/data/xray
      LocalProxy__CodespaceSshConfigDirectory: /app/data/codespaces-ssh
      GitHub__AutoStopIdleMinutes: 30
      GitHub__SyncIntervalSeconds: 300
    volumes:
      - gh-proxy-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5080'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: gh-proxy-frontend:local
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: 5173
      API_BASE_URL: http://127.0.0.1:5080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gh-proxy-data:
