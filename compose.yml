name: gh-proxy

services:
  backend:
    build:
      context: .
      dockerfile: src/GhProxy.Api/Dockerfile
      network: host
      args:
        DOTNET_BUILD_BASE: "${GH_PROXY_DOTNET_BUILD_BASE:-mcr.microsoft.com/dotnet/sdk:10.0}"
        BACKEND_RUNTIME_BASE: "${GH_PROXY_BACKEND_RUNTIME_BASE:-node:22-bookworm-slim}"
        NUGET_RESTORE_SOURCE: "${GH_PROXY_NUGET_RESTORE_SOURCE:-https://package-mirror.liara.ir/repository/nuget/index.json}"
        UBUNTU_APT_MIRROR: "${GH_PROXY_UBUNTU_APT_MIRROR:-https://mirror.arvancloud.ir/ubuntu}"
        DEBIAN_APT_MIRROR: "${GH_PROXY_DEBIAN_APT_MIRROR:-}"
        DEBIAN_SECURITY_MIRROR: "${GH_PROXY_DEBIAN_SECURITY_MIRROR:-}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1}"
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        no_proxy: "${no_proxy:-localhost,127.0.0.1}"
    image: gh-proxy-api:local
    network_mode: host
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5080
      TZ: Asia/Tehran
      HOME: /app/data/home
      ConnectionStrings__Default: Data Source=/app/data/gh-proxy.db
      Observability__LogDirectory: /app/data/logs
      LocalProxy__BindHostOverride: 127.0.0.1
      LocalProxy__ProbeTimeoutSeconds: 30
      LocalProxy__XrayExecutablePath: /usr/local/bin/xray
      LocalProxy__XrayConfigDirectory: /app/data/xray
      LocalProxy__CodespaceRemoteDashboardPort: 8898
      LocalProxy__CodespaceRemoteProxyCommand: proxy
      LocalProxy__CodespaceRemoteProxyStartupTimeoutSeconds: 120
      LocalProxy__CodespaceTunnelReadyTimeoutSeconds: 30
      GitHub__AutoStopIdleMinutes: 30
      GitHub__SyncIntervalSeconds: 300
    volumes:
      - gh-proxy-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5080'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
      args:
        NODE_BASE: "${GH_PROXY_FRONTEND_BASE:-node:22-bookworm-slim}"
        NPM_REGISTRY: "${GH_PROXY_NPM_REGISTRY:-https://package-mirror.liara.ir/repository/npm/}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1}"
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        no_proxy: "${no_proxy:-localhost,127.0.0.1}"
    image: gh-proxy-frontend:local
    network_mode: host
    restart: unless-stopped
    environment:
      PORT: 5173
      API_BASE_URL: http://127.0.0.1:5080
      TZ: Asia/Tehran
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gh-proxy-data:
