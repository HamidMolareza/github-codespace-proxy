name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_CERT_REVOCATION_MODE: offline

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('GhProxy.sln', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore GhProxy.sln -p:NuGetAudit=false --source https://api.nuget.org/v3/index.json
        env:
          NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

      - name: Build
        run: dotnet build GhProxy.sln --configuration Release --no-restore -p:NuGetAudit=false
        env:
          NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

      - name: Test
        run: dotnet test GhProxy.sln --configuration Release --no-build -p:NuGetAudit=false
        env:
          NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Compose config
        run: docker compose config
